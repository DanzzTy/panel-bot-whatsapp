
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel danzz bot Pro | Administrator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800">
    <div id="login-view" class="flex items-center justify-center min-h-screen">
        <div class="bg-white p-10 rounded-2xl shadow-xl w-96 border-t-4 border-indigo-600">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-extrabold text-indigo-600 mb-2"><i class="fa-solid fa-robot mr-2"></i>Danzz bot</h2>
                <p class="text-slate-500 text-xs font-bold tracking-widest uppercase">Server Administrator</p>
            </div>
            <div class="space-y-4">
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-slate-400"><i class="fa-solid fa-user"></i></div>
                    <input type="text" id="logUser" placeholder="Username" class="w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 font-medium">
                </div>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-slate-400"><i class="fa-solid fa-lock"></i></div>
                    <input type="password" id="logPass" placeholder="Password" class="w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 font-medium">
                </div>
                <button onclick="login()" id="btn-login" class="w-full bg-indigo-600 text-white font-bold py-3.5 rounded-xl hover:bg-indigo-700 shadow-md transition-all mt-2"><i class="fa-solid fa-right-to-bracket mr-2"></i> Masuk Sistem</button>
            </div>
        </div>
    </div>

    <div id="dashboard-view" class="hidden max-w-7xl mx-auto p-4 md:p-8">
        <div class="bg-white p-6 rounded-2xl shadow-sm mb-8 flex justify-between items-center border border-slate-200">
            <div class="flex items-center gap-4">
                <div class="bg-indigo-100 p-3.5 rounded-xl text-indigo-600"><i class="fa-solid fa-layer-group text-xl"></i></div>
                <div>
                    <h2 class="text-xl font-extrabold text-slate-800">Dashboard Panel</h2>
                    <p class="text-slate-500 text-sm font-medium">Pengguna: <span id="user-display" class="font-bold text-indigo-600 uppercase"></span></p>
                </div>
            </div>
            <button onclick="logout()" class="bg-rose-50 text-rose-600 border border-rose-200 px-5 py-2.5 rounded-xl font-bold hover:bg-rose-100"><i class="fa-solid fa-power-off mr-2"></i> Keluar</button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="space-y-6 lg:col-span-1">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 relative overflow-hidden">
                    <div class="absolute top-0 right-0 bg-emerald-500 text-white px-4 py-1.5 rounded-bl-xl text-[10px] font-black tracking-widest"><i class="fa-solid fa-bolt mr-1"></i> PAIRING</div>
                    <h3 class="font-bold text-lg mb-5 text-slate-800"><i class="fa-solid fa-qrcode text-emerald-500 mr-3 text-xl"></i> Hubungkan WA</h3>
                    <div class="space-y-4">
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-slate-400"><i class="fa-brands fa-whatsapp text-lg"></i></div>
                            <input type="text" id="botNumber" placeholder="628..." class="w-full pl-11 pr-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-emerald-500 font-semibold">
                        </div>
                        <button onclick="pairBot()" id="btn-pair" class="w-full bg-emerald-500 text-white font-bold py-3.5 rounded-xl hover:bg-emerald-600"><i class="fa-solid fa-link mr-2"></i> Dapatkan Kode</button>
                    </div>
                    <div id="loading-section" class="hidden mt-6 text-center bg-slate-50 p-4 rounded-xl border border-slate-100"><p class="text-sm text-emerald-600 font-bold"><i class="fa-solid fa-spinner fa-spin mr-2"></i> Menghubungi Server...</p></div>
                    <div id="code-section" class="hidden mt-6 text-center bg-emerald-50 p-6 rounded-xl border border-emerald-200 shadow-inner">
                        <p class="text-xs text-emerald-700 mb-2 font-black uppercase tracking-widest"><i class="fa-solid fa-key mr-1"></i> Kode Pairing</p>
                        <h1 id="pairing-code" class="text-4xl font-black tracking-[0.2em] text-emerald-600 drop-shadow-sm"></h1>
                    </div>
                </div>

                <div id="admin-section" class="hidden bg-indigo-50 p-6 rounded-2xl shadow-sm border border-indigo-200">
                    <h3 class="font-bold text-lg mb-5 text-indigo-800"><i class="fa-solid fa-user-shield mr-2"></i> Buat Akun Panel</h3>
                    <div class="space-y-4">
                        <input type="text" id="newUsername" placeholder="Username Baru" class="w-full px-4 py-3 bg-white border border-indigo-100 rounded-xl outline-none focus:ring-2 focus:ring-indigo-400 font-medium">
                        <input type="text" id="newPassword" placeholder="Password Baru" class="w-full px-4 py-3 bg-white border border-indigo-100 rounded-xl outline-none focus:ring-2 focus:ring-indigo-400 font-medium">
                        <button onclick="addUser()" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl hover:bg-indigo-700"><i class="fa-solid fa-user-plus mr-2"></i> Tambah Pengguna</button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 h-full">
                    <h3 class="font-bold text-lg text-slate-800 mb-6"><i class="fa-solid fa-server text-indigo-500 mr-3 text-xl"></i> Manajemen Bot Server</h3>
                    <div class="overflow-x-auto rounded-xl border border-slate-200">
                        <table class="w-full text-left bg-white whitespace-nowrap">
                            <thead class="bg-slate-50 border-b border-slate-200">
                                <tr>
                                    <th class="p-4 text-xs font-extrabold text-slate-500 uppercase tracking-wider">Identitas Akun</th>
                                    <th class="p-4 text-xs font-extrabold text-slate-500 uppercase tracking-wider text-center">Status</th>
                                    <th class="p-4 text-xs font-extrabold text-slate-500 uppercase tracking-wider text-right">Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="bot-list" class="divide-y divide-slate-100 text-sm"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="edit-modal" class="hidden fixed inset-0 bg-slate-900 bg-opacity-50 backdrop-blur-sm flex items-center justify-center z-50 p-4 transition-all">
        <div class="bg-white p-8 rounded-2xl w-full max-w-md shadow-2xl border border-slate-100">
            <div class="flex justify-between items-center mb-6 border-b border-slate-100 pb-4">
                <h3 class="font-extrabold text-xl text-slate-800"><i class="fa-solid fa-sliders text-indigo-500 mr-2"></i> Konfigurasi Profil</h3>
                <button onclick="closeEditModal()" class="text-slate-400 hover:text-rose-500 transition-colors text-2xl font-bold"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <input type="hidden" id="edit-oldNumber">
            <div class="space-y-5">
                <div class="bg-slate-50 p-4.5 rounded-xl border border-slate-200">
                    <h4 class="text-[11px] font-black text-slate-400 uppercase tracking-wider mb-3"><i class="fa-solid fa-id-card mr-1"></i> Data Identitas</h4>
                    <div class="space-y-3">
                        <div class="flex gap-3">
                            <div class="w-1/2">
                                <label class="text-[10px] text-slate-500 font-bold mb-1.5 block">NAMA PANGGILAN (Misal: Mas Danzz)</label>
                                <input type="text" id="edit-botName" class="w-full px-3 py-2.5 bg-white border border-slate-200 rounded-lg outline-none text-sm focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 font-medium">
                            </div>
                            <div class="w-1/2">
                                <label class="text-[10px] text-slate-500 font-bold mb-1.5 block">NAMA OWNER</label>
                                <input type="text" id="edit-ownerName" class="w-full px-3 py-2.5 bg-white border border-slate-200 rounded-lg outline-none text-sm focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 font-medium">
                            </div>
                        </div>
                        <div>
                            <label class="text-[10px] text-slate-500 font-bold mb-1.5 block">NOMOR WA OWNER (Format: 628xxx)</label>
                            <input type="text" id="edit-ownerNumber" class="w-full px-3 py-2.5 bg-white border border-slate-200 rounded-lg outline-none text-sm focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 font-medium" placeholder="628123456789">
                        </div>
                    </div>
                </div>
                <div class="bg-slate-50 p-4.5 rounded-xl border border-slate-200">
                    <h4 class="text-[11px] font-black text-slate-400 uppercase tracking-wider mb-3"><i class="fa-solid fa-image mr-1"></i> Watermark Stiker</h4>
                    <div class="space-y-3">
                        <div>
                            <label class="text-[10px] text-slate-500 font-bold mb-1 block">TEKS ATAS</label>
                            <input type="text" id="edit-packname" class="w-full px-3 py-2.5 bg-white border border-slate-200 rounded-lg outline-none text-sm focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 font-medium">
                        </div>
                        <div>
                            <label class="text-[10px] text-slate-500 font-bold mb-1 block">TEKS BAWAH</label>
                            <input type="text" id="edit-author" class="w-full px-3 py-2.5 bg-white border border-slate-200 rounded-lg outline-none text-sm focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 font-medium">
                        </div>
                    </div>
                </div>
            </div>
            <div class="mt-8 flex justify-end gap-3">
                <button onclick="closeEditModal()" class="px-5 py-2.5 bg-slate-200 text-slate-700 hover:bg-slate-300 rounded-xl font-bold text-sm">Batal</button>
                <button onclick="saveEditBot()" class="px-5 py-2.5 bg-indigo-600 text-white hover:bg-indigo-700 rounded-xl font-bold text-sm shadow-md"><i class="fa-solid fa-floppy-disk mr-2"></i> Simpan Data</button>
            </div>
        </div>
    </div>

    <script>
        let currentUser = localStorage.getItem('danzzbot_user');
        let currentBotsData = {};

        if(currentUser) showDashboard();

        async function req(url, body) {
            body.user = currentUser; 
            const res = await fetch(url, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) });
            return res.json();
        }

        async function login() {
            const u = document.getElementById('logUser').value, p = document.getElementById('logPass').value;
            if(!u || !p) return alert("Silakan lengkapi form!");
            const btn = document.getElementById('btn-login');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> Memeriksa...';
            
            const res = await req('/api/login', { u, p });
            if(res.success) { 
                currentUser = u; 
                localStorage.setItem('danzzbot_user', u); 
                if (res.isAdmin) localStorage.setItem('danzzbot_admin', 'true');
                else localStorage.removeItem('danzzbot_admin');
                showDashboard(); 
            } 
            else { 
                alert("Gagal Login! Username atau password salah."); 
                btn.innerHTML = '<i class="fa-solid fa-right-to-bracket mr-2"></i> Masuk Sistem'; 
            }
        }

        function logout() { localStorage.clear(); location.reload(); }

        function showDashboard() {
            document.getElementById('login-view').style.display = 'none';
            document.getElementById('dashboard-view').classList.remove('hidden');
            document.getElementById('user-display').innerText = currentUser;
            
            if (localStorage.getItem('danzzbot_admin') === 'true') {
                document.getElementById('admin-section').classList.remove('hidden');
            }
            
            loadBots(); setInterval(loadBots, 3000);
        }

        async function addUser() {
            const u = document.getElementById('newUsername').value, p = document.getElementById('newPassword').value;
            if(!u || !p) return alert("Isi username & password!");
            const res = await req('/api/add_user', { newU: u, newP: p });
            alert(res.message);
            if(res.success) { document.getElementById('newUsername').value = ''; document.getElementById('newPassword').value = ''; }
        }

        async function pairBot() {
            const bot = document.getElementById('botNumber').value; if(!bot) return;
            document.getElementById('btn-pair').classList.add('hidden');
            document.getElementById('loading-section').classList.remove('hidden');
            document.getElementById('code-section').classList.add('hidden');
            
            const res = await req('/api/pair', { botNumber: bot });
            document.getElementById('loading-section').classList.add('hidden');
            
            if(res.success) {
                document.getElementById('code-section').classList.remove('hidden');
                document.getElementById('pairing-code').innerText = res.code;
            } else { 
                alert(res.message); 
            }
            document.getElementById('btn-pair').classList.remove('hidden');
            loadBots();
        }

        async function actionBot(botNumber, action) {
            if(action === 'delete' && !confirm('Yakin hapus permanen?')) return;
            await req('/api/bot_action', { botNumber, action }); loadBots();
        }

        function openEditModal(bot) {
            const data = currentBotsData[bot];
            document.getElementById('edit-oldNumber').value = bot;
            document.getElementById('edit-botName').value = data.botName || 'Danzz';
            document.getElementById('edit-ownerName').value = data.ownerName || 'Owner';
            document.getElementById('edit-ownerNumber').value = data.ownerNum || '';
            document.getElementById('edit-packname').value = data.packname || 'Created by Danzz';
            let cleanAuthor = data.author || '';
            cleanAuthor = cleanAuthor.replace(' | danzz-bot-whatsapp.vercel.app/', '');
            document.getElementById('edit-author').value = cleanAuthor;
            document.getElementById('edit-modal').classList.remove('hidden');
        }

        function closeEditModal() { document.getElementById('edit-modal').classList.add('hidden'); }

        async function saveEditBot() {
            const oldNumber = document.getElementById('edit-oldNumber').value;
            const res = await req('/api/edit_bot', { 
                oldNumber, 
                botName: document.getElementById('edit-botName').value, 
                ownerName: document.getElementById('edit-ownerName').value,
                ownerNum: document.getElementById('edit-ownerNumber').value,
                packname: document.getElementById('edit-packname').value, 
                author: document.getElementById('edit-author').value 
            });
            if(res.success) { closeEditModal(); loadBots(); }
        }

        async function loadBots() {
            try {
                const res = await req('/api/get_bots', {});
                currentBotsData = res.bots; 
                const tbody = document.getElementById('bot-list'); tbody.innerHTML = '';
                for(const bot in res.bots) {
                    const d = res.bots[bot];
                    const isOnline = d.status === 'online';
                    const badge = isOnline 
                        ? '<span class="bg-emerald-100 text-emerald-700 px-3 py-1.5 rounded-full text-[11px] font-bold inline-flex items-center"><i class="fa-solid fa-circle-check mr-1.5"></i>ONLINE</span>' 
                        : '<span class="bg-rose-100 text-rose-700 px-3 py-1.5 rounded-full text-[11px] font-bold inline-flex items-center"><i class="fa-solid fa-circle-xmark mr-1.5"></i>OFFLINE</span>';
                    
                    tbody.innerHTML += `
                        <tr class="hover:bg-slate-50 transition-colors">
                            <td class="p-4 border-b border-slate-100">
                                <div class="font-extrabold text-slate-800 text-sm mb-1.5 flex items-center"><i class="fa-brands fa-whatsapp text-emerald-500 mr-2 text-lg"></i>${bot}</div>
                                <div class="text-[11px] text-slate-500 font-semibold flex items-center gap-3">
                                    <span><i class="fa-solid fa-user text-slate-400 mr-1"></i> Kak ${d.botName || 'Diva'}</span>
                                    <span><i class="fa-solid fa-crown text-amber-500 mr-1"></i> ${d.ownerName || 'Owner'}</span>
                                    <span><i class="fa-solid fa-phone text-blue-400 mr-1"></i> ${d.ownerNum || 'Belum di-set'}</span>
                                </div>
                            </td>
                            <td class="p-4 border-b border-slate-100 text-center">${badge}</td>
                            <td class="p-4 border-b border-slate-100 text-right space-x-1.5">
                                ${!isOnline ? `<button onclick="actionBot('${bot}', 'start')" class="text-emerald-600 bg-emerald-50 hover:bg-emerald-100 border border-emerald-200 px-3.5 py-2 rounded-lg text-sm"><i class="fa-solid fa-play"></i></button>` : ''}
                                ${isOnline ? `<button onclick="actionBot('${bot}', 'stop')" class="text-amber-600 bg-amber-50 hover:bg-amber-100 border border-amber-200 px-3.5 py-2 rounded-lg text-sm"><i class="fa-solid fa-stop"></i></button>` : ''}
                                ${isOnline ? `<button onclick="actionBot('${bot}', 'restart')" class="text-blue-600 bg-blue-50 hover:bg-blue-100 border border-blue-200 px-3.5 py-2 rounded-lg text-sm"><i class="fa-solid fa-rotate-right"></i></button>` : ''}
                                <button onclick="openEditModal('${bot}')" class="text-indigo-600 bg-indigo-50 hover:bg-indigo-100 border border-indigo-200 px-3.5 py-2 rounded-lg text-sm"><i class="fa-solid fa-sliders"></i></button>
                                <button onclick="actionBot('${bot}', 'delete')" class="text-rose-600 bg-rose-50 hover:bg-rose-100 border border-rose-200 px-3.5 py-2 rounded-lg text-sm"><i class="fa-solid fa-trash-can"></i></button>
                            </td>
                        </tr>`;
                }
            } catch(e) {}
        }
    </script>
</body>
</html>
